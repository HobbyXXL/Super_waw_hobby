<!DOCTYPE html>
<html>
<head>
  <title>HobbyFriend Demo</title>
</head>
<body>

<h2>HobbyFriend Demo</h2>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="createPost()">Create Post</button>
<button onclick="getFeed()">Get Feed</button>

<pre id="output"></pre>

<script>
let token = ""

function log(data){
  document.getElementById("output").textContent = JSON.stringify(data, null, 2)
}

async function register(){
  let r = await fetch("/auth/register", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      login:"demo2",
      email:"demo2@mail.com",
      password:"123"
    })
  })
  log(await r.json())
}

async function login(){
  let r = await fetch("/auth/login", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      login:"demo",
      password:"123456"
    })
  })
  let data = await r.json()
  token = data.access_token
  log(data)
}

async function createPost(){
  let r = await fetch("/posts/", {
    method:"POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({content:"Hello!"})
  })
  log(await r.json())
}

async function getFeed(){
  let r = await fetch("/posts/feed", {
    headers: {"Authorization":"Bearer " + token}
  })
  log(await r.json())
}
</script>

</body>
</html>
